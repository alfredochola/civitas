<div class="lightbox-overlay d-flex flex-column justify-content-center align-items-center" (click)="close.emit()">
  <!-- Close Button -->
  <button class="btn-close-lightbox" (click)="close.emit(); $event.stopPropagation()" aria-label="Close">
    <i class="bi bi-x-lg"></i>
  </button>

  <!-- Main Image Container -->
  <div class="lightbox-content-container d-flex align-items-center justify-content-center" (click)="$event.stopPropagation()">
    <!-- Prev Button -->
    <button class="btn-nav btn-prev" (click)="prev()" aria-label="Previous image">
      <i class="bi bi-chevron-left"></i>
    </button>

    <!-- Main Image -->
    <div class="image-wrapper d-flex flex-column align-items-center justify-content-center position-relative" style="min-height: 400px; min-width: 300px;">
      <!-- Loading Spinner inside Lightbox -->
      <div *ngIf="imageLoading" class="lightbox-spinner position-absolute d-flex align-items-center justify-content-center" style="z-index: 10;">
        <div class="spinner-border text-warning" style="width: 3rem; height: 3rem;" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
      
      <img [src]="images[currentIndex]" 
           alt="Full screen preview" 
           class="lightbox-image"
           [class.loaded]="!imageLoading"
           (load)="onImageLoad()">
           
      <div class="lightbox-caption mt-3 text-white-50 small font-headings font-uppercase">
        Image {{ currentIndex + 1 }} of {{ images.length }}
      </div>
    </div>

    <!-- Next Button -->
    <button class="btn-nav btn-next" (click)="next()" aria-label="Next image">
      <i class="bi bi-chevron-right"></i>
    </button>
  </div>
</div>
